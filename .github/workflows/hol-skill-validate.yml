name: HOL Skill Validate

on:
  push:
    branches: [main]
    paths:
      - skills/github-commander/**
      - .github/workflows/hol-skill-validate.yml
  pull_request:
    branches: [main]
    paths:
      - skills/github-commander/**
      - .github/workflows/hol-skill-validate.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: none

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate Skill
        uses: hashgraph-online/skill-publish@5ea6109cf9c3f8c3d9dad028f963790a56497257 # v1.0.13
        with:
          mode: validate
          skill-dir: skills/github-commander
          annotate: 'false'
          preview-upload: 'false'
