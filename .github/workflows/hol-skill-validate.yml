name: HOL Skill Validate

on:
  push:
    branches: [main]
    paths:
      - skills/github-commander/**
      - .github/workflows/hol-skill-validate.yml
  pull_request:
    branches: [main]
    paths:
      - skills/github-commander/**
      - .github/workflows/hol-skill-validate.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: none

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate Skill
        uses: hashgraph-online/skill-publish@f9a1962fcbd8116e1e82bed3c97d9223a6206ac4 # v1.2
        with:
          api-key: ${{ secrets.RB_API_KEY }}
          skill-dir: skills/github-commander
          annotate: 'false'
