services:
  memory-journal-mcp:
    build: .
    container_name: memory-journal-mcp
    volumes:
      # Mount local data directory for persistent SQLite database
      - ./data:/app/data:rw,noexec,nosuid,nodev
    environment:
      - DB_PATH=/app/data/memory_journal.db
      - AUDIT_LOG_PATH=stderr
      # Optional: GitHub integration
      # - GITHUB_TOKEN=<your-github-token>
      # - PROJECT_REGISTRY={"my-repo":{"path":"/app/repo","project_number":1}}
      # Optional: CORS origin (default: none)
      # - MCP_CORS_ORIGIN=http://localhost:3000
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - mcp-net
    stdin_open: true
    tty: true
    # MCP stdio communication (default transport)
    command: ['node', 'dist/cli.js']
    restart: unless-stopped

  # HTTP transport service for remote access
  memory-journal-mcp-http:
    build: .
    container_name: memory-journal-mcp-http
    volumes:
      - ./data:/app/data:rw,noexec,nosuid,nodev
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/memory_journal.db
      - MCP_HOST=0.0.0.0
      - AUDIT_LOG_PATH=stderr
      # Required for HTTP: Bearer token authentication
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-change_this_to_a_secure_token_for_production}
      # Optional: GitHub integration
      # - GITHUB_TOKEN=<your-github-token>
      # - PROJECT_REGISTRY={"my-repo":{"path":"/app/repo","project_number":1}}
      # Optional: CORS origin (default: none)
      # - MCP_CORS_ORIGIN=http://localhost:3000
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - mcp-net
    ports:
      - '3000:3000'
    command: ['node', 'dist/cli.js', '--transport', 'http', '--port', '3000', '--server-host', '0.0.0.0']
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    profiles:
      - http

networks:
  mcp-net:
    driver: bridge
